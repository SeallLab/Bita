name: Deploy to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 'Deploy via SSH'
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd Fairness-Chatbot/api

          # Pull latest code
          git pull origin main

          # Stop and remove old container
          docker stop backend-container || true
          docker rm -f backend-container || true

          # Remove dangling images
          docker image prune -f

          # Build and run new container with memory limit
          docker build -f Dockerfile.backend -t fairness-backend .
          docker run -d --restart=always --name backend-container -p 5000:5000 --memory=1.2g fairness-backend
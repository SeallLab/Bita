app = "fairness-api"

[build]
  dockerfile = "api/Dockerfile.backend"

[env]
  PORT = "5000"

[resources]
  cpu = "shared"
  memory_mb = 256

[services]
  [[services.http]]
    internal_port = 5000
    protocol = "tcp"

    [[services.http.ports]]
      handlers = ["http"]
      port = 80

    [[services.http.ports]]
      handlers = ["tls", "http"]
      port = 443
